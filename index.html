<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>So Help Me God</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<button id="playPauseBtn" onclick="togglePlay()">▶️ Play</button>

<script>

let currentAlbum = {
  name: "So Help Me God",
  cover: "newsohelpmegodcover.jpg",
  songs: [
      { file: "prayer.mp3", title: "Prayer", artist: "Kanye West, Bon Iver" },
      { file: "hudmoidea.mp3", title: "Hudmo Idea", artist: "Kanye West" },
      { file: "midastouch.mp3", title: "Midas Touch", artist: "Kanye West, J. Cole, Rihanna" },
      { file: "floatinsuperstarred.mp3", title: "Floatin'/Super Starred", artist: "Kanye West" },
      { file: "southsideserenade.mp3", title: "Southside Serenade", artist: "Kanye West" },
      { file: "howyoufeeling.mp3", title: "How You Feeling", artist: "Kanye West" },
      { file: "startime.mp3", title: "Star Time", artist: "Kanye West, G Eazy, IDK, Anderson .Paak" },
      {
        title: "All Day",
        versions: [
      {
        version: "V11",
        file: "alldayv11.mp3",
        artist: "Kanye West, 2 Chainz, Theophilus London, Allan Kingdom, Paul McCartney"
      },
      {
        version: "V10",
        file: "alldayog.mp3",
        artist: "Kanye West, Kendrick Lamar, Theophilus London, Allan Kingdom, Paul McCartney"
      }
    ]
  },
      { file: "thatsonyou.mp3", title: "That's On You", artist: "Kanye West" },
      { file: "theballadofkanyewestthechosenone.mp3", title: "The Ballad Of Kanye West (The Chosen One)", artist: "Kanye West" },
      { file: "wolves.mp3", title: "Wolves", artist: "Kanye West, Vic Mensa, Sia, Frank Ocean" },
      { file: "fourfivesecondsdemo.mp3", title: "FourFiveSeconds", artist: "Kanye West, Paul McCartney" },
      { file: "themindispowerful.mp3", title: "The Mind Is Powerful", artist: "Kanye West, The-Dream" },
      { file: "wokeup.mp3", title: "Woke Up", artist: "Kanye West, Ty Dolla $ign" },
      { file: "fade.mp3", title: "Fade", artist: "Kanye West, Ty Dolla $ign, James Blake" },
      { file: "manup.mp3", title: "Man Up", artist: "Kanye West, Young Thug" },
      { file: "ifeellikethat.mp3", title: "I Feel Like That", artist: "Kanye West, Ty Dolla $ign, Tony Williams" },
      { file: "auxillary.mp3", title: "Auxillary", artist: "Kanye West, Bibi Bourelly" },
      { file: "ruletheworld.mp3", title: "Rule The World", artist: "Kanye West, Kirby Lauryen" },
      { file: "awesomev16.mp3", title: "Awesome (v16)", artist: "Kanye West, Charlie Wilson, Ty Dolla $ign" },
      { file: "goprov3.mp3", title: "Go Pro (v3)", artist: "Kanye West, Madonna" },
      { file: "ultralightprayerinterlude.mp3", title: "Ultralight Prayer Interlude", artist: "Kanye West, Kirk Franklin, Quior" }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {

    // SONG WITH MULTIPLE VERSIONS
    if (song.versions) {

      const group = document.createElement("div");
      group.className = "song";

      group.innerHTML = `<strong>${song.title} ▼</strong>`;

      group.onclick = () => {

        // prevent duplicates
        if (group.dataset.opened) return;
        group.dataset.opened = true;

        song.versions.forEach(version => {

          const div = document.createElement("div");
          div.className = "song";

          div.innerHTML = `
            <div style="display:flex; align-items:center;">
              <div style="width:60px;">
                <strong>${version.version}</strong>
              </div>

              <div style="flex:1; text-align:center;">
                <strong>${song.title}</strong><br>
                <small>${version.artist}</small>
              </div>
            </div>
          `;

          div.onclick = (e) => {
            e.stopPropagation();

            window.audio.src = version.file;
            window.audio.play();

            updateMediaSession({
              title: song.title,
              artist: version.artist
            });
          };

          group.after(div);

        });

      };

      songsDiv.appendChild(group);

    }

    // NORMAL SONG
    else {

      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <strong>${song.title}</strong><br>
        <small>${song.artist || ""}</small>
      `;

      div.onclick = () => playSong(i);

      songsDiv.appendChild(div);

    }

  });

}

// PLAY SONG
function playSong(i) {

  // Skip version groups
  while (
    i < currentAlbum.songs.length &&
    currentAlbum.songs[i].versions
  ) {
    i++;
  }

  // Loop back to beginning if needed
  if (i >= currentAlbum.songs.length) {
    i = 0;

    while (
      i < currentAlbum.songs.length &&
      currentAlbum.songs[i].versions
    ) {
      i++;
    }
  }

  currentIndex = i;

  const song = currentAlbum.songs[i];

  window.audio.src = song.file;
  window.audio.play();

  updateMediaSession(song, currentAlbum);
}

function updateMediaSession(song) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: currentAlbum.name,
    artwork: [
      { src: currentAlbum.cover, sizes: "512x512", type: "image/jpg" }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex - 1 + currentAlbum.songs.length) % currentAlbum.songs.length;
    playSong(currentIndex);
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (!currentAlbum) return;
    currentIndex = (currentIndex + 1) % currentAlbum.songs.length;
    playSong(currentIndex);
  });
}

  if ("mediaSession" in navigator) {

  navigator.mediaSession.setActionHandler("play", async () => {
    await audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

}

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

  audio.addEventListener("play", () => {
  document.getElementById("playPauseBtn").innerText = "⏸️ Pause";
});

audio.addEventListener("pause", () => {
  document.getElementById("playPauseBtn").innerText = "▶️ Play";
});

window.addEventListener("DOMContentLoaded", () => {

  const audio = document.getElementById("audio");

  audio.addEventListener("ended", () => {
  if (!currentAlbum) return;

  const list = getPlayableSongs();

  const currentSong = currentAlbum.songs[currentIndex];
  const nextIndex = list.indexOf(currentSong) + 1;

  if (nextIndex < list.length) {
    const nextSong = list[nextIndex];

    const realIndex = currentAlbum.songs.indexOf(nextSong);
    playSong(realIndex);
  } else {
    playSong(currentAlbum.songs.indexOf(list[0]));
  }
});

  // expose audio globally so playSong can use it safely
  window.audio = audio;
});

function getPlayableSongs() {
  const list = [];

  currentAlbum.songs.forEach(song => {
    if (song.versions) {
      // skip the container entirely
      return;
    }
    list.push(song);
  });

  return list;
}
  
</script>

</body>
</html>
